<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="感染拡大クリッカー / Outbreak Clicker">
  <defs>
    <radialGradient id="ob-bg" cx="50%" cy="36%" r="78%">
      <stop offset="0" stop-color="#2a0b0b"/>
      <stop offset="1" stop-color="#0a0a0c"/>
    </radialGradient>
    <radialGradient id="ob-body" cx="42%" cy="38%" r="72%">
      <stop offset="0" stop-color="#ff8c82"/>
      <stop offset="0.55" stop-color="#ff5a4d"/>
      <stop offset="1" stop-color="#b3261e"/>
    </radialGradient>
    <filter id="ob-glow" x="-45%" y="-45%" width="190%" height="190%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="115" fill="url(#ob-bg)"/>
  <g transform="translate(256,256)" filter="url(#ob-glow)">
    <!-- spike proteins: 12 stalks with knob tips -->
    <g stroke="#ff6f63" stroke-width="15" stroke-linecap="round">
      <g transform="rotate(0)"><line y1="-104" y2="-150"/><circle cy="-164" r="13" fill="#ff6f63" stroke="none"/></g>
      <g transform="rotate(30)"><line y1="-104" y2="-150"/><circle cy="-164" r="13" fill="#ff6f63" stroke="none"/></g>
      <g transform="rotate(60)"><line y1="-104" y2="-150"/><circle cy="-164" r="13" fill="#ff6f63" stroke="none"/></g>
      <g transform="rotate(90)"><line y1="-104" y2="-150"/><circle cy="-164" r="13" fill="#ff6f63" stroke="none"/></g>
      <g transform="rotate(120)"><line y1="-104" y2="-150"/><circle cy="-164" r="13" fill="#ff6f63" stroke="none"/></g>
      <g transform="rotate(150)"><line y1="-104" y2="-150"/><circle cy="-164" r="13" fill="#ff6f63" stroke="none"/></g>
      <g transform="rotate(180)"><line y1="-104" y2="-150"/><circle cy="-164" r="13" fill="#ff6f63" stroke="none"/></g>
      <g transform="rotate(210)"><line y1="-104" y2="-150"/><circle cy="-164" r="13" fill="#ff6f63" stroke="none"/></g>
      <g transform="rotate(240)"><line y1="-104" y2="-150"/><circle cy="-164" r="13" fill="#ff6f63" stroke="none"/></g>
      <g transform="rotate(270)"><line y1="-104" y2="-150"/><circle cy="-164" r="13" fill="#ff6f63" stroke="none"/></g>
      <g transform="rotate(300)"><line y1="-104" y2="-150"/><circle cy="-164" r="13" fill="#ff6f63" stroke="none"/></g>
      <g transform="rotate(330)"><line y1="-104" y2="-150"/><circle cy="-164" r="13" fill="#ff6f63" stroke="none"/></g>
    </g>
    <!-- virion body -->
    <circle r="112" fill="url(#ob-body)"/>
    <circle r="112" fill="none" stroke="#ffb3ab" stroke-opacity="0.25" stroke-width="4"/>
    <!-- surface proteins -->
    <circle cx="-36" cy="-24" r="17" fill="#ff8c82" fill-opacity="0.9"/>
    <circle cx="32" cy="22" r="21" fill="#c8302a" fill-opacity="0.85"/>
    <circle cx="48" cy="-42" r="12" fill="#c8302a" fill-opacity="0.7"/>
    <circle cx="-16" cy="50" r="14" fill="#ff8c82" fill-opacity="0.8"/>
    <circle cx="-58" cy="30" r="9" fill="#c8302a" fill-opacity="0.6"/>
  </g>
</svg>
